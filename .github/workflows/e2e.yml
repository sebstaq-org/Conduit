name: E2E

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcap-dev pkg-config

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Electron sandbox helper
        run: |
          ELECTRON_SANDBOX_PATH="$(node -e "const path = require('node:path'); const pkg = require.resolve('electron/package.json'); process.stdout.write(path.join(path.dirname(pkg), 'dist', 'chrome-sandbox'));")"
          sudo chown root:root "$ELECTRON_SANDBOX_PATH"
          sudo chmod 4755 "$ELECTRON_SANDBOX_PATH"

      - name: Install Chromium
        run: pnpm --filter @conduit/e2e exec playwright install --with-deps chromium

      - name: Typecheck E2E
        run: pnpm --filter @conduit/e2e run typecheck

      - name: Run E2E
        run: xvfb-run -a pnpm --filter @conduit/e2e run test
