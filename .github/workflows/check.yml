name: Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify Cargo metadata
        run: cargo metadata --manifest-path backend/service/Cargo.toml --format-version 1 > /dev/null

      - name: Run repo checks
        run: pnpm run check
